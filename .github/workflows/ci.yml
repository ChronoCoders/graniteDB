name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --check
      - name: test
        run: cargo test
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  loom:
    name: Loom (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: loom test
        run: cargo test --test loom --features loom
