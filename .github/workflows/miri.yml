name: Miri

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: miri setup
        run: cargo miri setup
      - name: miri test
        run: cargo miri test
