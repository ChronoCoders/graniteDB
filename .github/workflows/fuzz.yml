name: Fuzz (smoke)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 3"

jobs:
  fuzz_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: fuzz wal (smoke)
        working-directory: fuzz
        run: cargo fuzz run fuzz_wal -- -runs=2000

      - name: fuzz manifest (smoke)
        working-directory: fuzz
        run: cargo fuzz run fuzz_manifest -- -runs=2000

      - name: fuzz sstable (smoke)
        working-directory: fuzz
        run: cargo fuzz run fuzz_sstable -- -runs=2000
